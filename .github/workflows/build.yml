name: Build distributables

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android phone and watch APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Android SDK platform
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36.1" \
            "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test and build phone and watch APKs
        run: >-
          ./gradlew
          :app:testDiagnosticDebugUnitTest
          :app:testProductionDebugUnitTest
          :mobile:testDebugUnitTest
          :app:assembleDiagnosticDebug
          :app:assembleProductionDebug
          :mobile:assembleDebug
          :app:lintDiagnosticDebug
          :app:lintProductionDebug
          :mobile:lintDebug
          --no-daemon

      - name: Prepare Android downloads
        shell: bash
        run: |
          mkdir -p dist/android
          cp app/build/outputs/apk/diagnostic/debug/app-diagnostic-debug.apk dist/android/Vrc_realtimeheartbeat-watch-diagnostic.apk
          cp app/build/outputs/apk/production/debug/app-production-debug.apk dist/android/Vrc_realtimeheartbeat-watch-production.apk
          cp mobile/build/outputs/apk/debug/mobile-debug.apk dist/android/Vrc_realtimeheartbeat-phone-debug.apk
          cd dist/android
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload Android APKs
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apks
          path: dist/android/
          if-no-files-found: error
          retention-days: 14

  windows-csharp:
    name: Windows C# fallback package
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Run bridge protocol self-test
        shell: powershell
        run: |
          .\pc-bridge\HeartRateBridge.ps1 -SelfTest
          .\pc-bridge\WatchTestReport.ps1 -SelfTest

      - name: Build Windows bridge EXE
        shell: powershell
        run: |
          .\pc-bridge\Build-Exe.ps1 -OutputDirectory '.\dist\windows'

      - name: Package Windows bridge
        shell: powershell
        run: |
          $output = Join-Path $env:GITHUB_WORKSPACE 'dist\windows'
          $stage = Join-Path $env:RUNNER_TEMP 'VrcRealtimeHeartbeat-windows'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item (Join-Path $output 'VrcRealtimeHeartbeat.exe') $stage
          Copy-Item '.\pc-bridge\README.md' $stage
          Copy-Item '.\pc-bridge\WatchTestReport.ps1' $stage
          $zip = Join-Path $output 'VrcRealtimeHeartbeat-windows.zip'
          Compress-Archive -Path "$stage\*" -DestinationPath $zip -Force
          $exeHash = (Get-FileHash (Join-Path $output 'VrcRealtimeHeartbeat.exe') -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipHash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "$exeHash  VrcRealtimeHeartbeat.exe"
            "$zipHash  VrcRealtimeHeartbeat-windows.zip"
          ) | Set-Content (Join-Path $output 'SHA256SUMS.txt') -Encoding ASCII

      - name: Upload Windows package
        uses: actions/upload-artifact@v6
        with:
          name: windows-csharp-heart-rate-bridge
          path: dist/windows/
          if-no-files-found: error
          retention-days: 14

  windows-python:
    name: Windows Python bridge package
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pc-python/requirements-dev.txt

      - name: Install test and packaging tools
        run: python -m pip install -r .\pc-python\requirements-dev.txt

      - name: Run Python tests and build EXE
        shell: powershell
        run: .\pc-python\Build-Exe.ps1 -Python python

      - name: Package Python bridge
        shell: powershell
        run: |
          $output = Join-Path $env:GITHUB_WORKSPACE 'dist\windows-python'
          $stage = Join-Path $env:RUNNER_TEMP 'VrcRealtimeHeartbeat-windows-python'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item (Join-Path $output 'VrcRealtimeHeartbeat-Python.exe') $stage
          Copy-Item '.\pc-python\README.md' $stage
          $zip = Join-Path $output 'VrcRealtimeHeartbeat-windows-python.zip'
          Compress-Archive -Path "$stage\*" -DestinationPath $zip -Force
          $exeHash = (Get-FileHash (Join-Path $output 'VrcRealtimeHeartbeat-Python.exe') -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipHash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          @(
            "$exeHash  VrcRealtimeHeartbeat-Python.exe"
            "$zipHash  VrcRealtimeHeartbeat-windows-python.zip"
          ) | Set-Content (Join-Path $output 'SHA256SUMS.txt') -Encoding ASCII

      - name: Upload Python Windows package
        uses: actions/upload-artifact@v6
        with:
          name: windows-python-heart-rate-bridge
          path: dist/windows-python/
          if-no-files-found: error
          retention-days: 14
